name: publish

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      npm_tag:
        description: npm dist tag
        required: true
        default: latest
        type: choice
        options:
          - latest
          - beta
          - next
      dry_run:
        description: Run checks and package without publishing
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  npm:
    runs-on: ubuntu-latest
    environment: npm
    env:
      NPM_TAG: ${{ github.event.inputs.npm_tag || 'latest' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm pack --dry-run
      - name: Read package metadata
        run: |
          echo "PACKAGE_NAME=$(node -p "require('./package.json').name")" >> "$GITHUB_ENV"
          echo "PACKAGE_VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"
          echo "PACKAGE_TAG=v$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"
      - name: Check npm version
        id: npm_version
        shell: bash
        run: |
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create git tag from package.json
        if: github.event_name == 'workflow_dispatch' && env.DRY_RUN != 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$PACKAGE_TAG" >/dev/null 2>&1; then
            echo "Tag $PACKAGE_TAG already exists locally"
          elif git ls-remote --tags origin "refs/tags/$PACKAGE_TAG" | grep -q "$PACKAGE_TAG"; then
            echo "Tag $PACKAGE_TAG already exists on origin"
          else
            git tag "$PACKAGE_TAG"
            git push origin "$PACKAGE_TAG"
          fi
      - name: Publish to npm
        if: env.DRY_RUN != 'true' && steps.npm_version.outputs.published != 'true'
        run: npm publish --access public --tag "$NPM_TAG" --provenance
      - name: Skip already published version
        if: env.DRY_RUN != 'true' && steps.npm_version.outputs.published == 'true'
        run: echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published"
      - name: Dry run complete
        if: env.DRY_RUN == 'true'
        run: npm publish --access public --tag "$NPM_TAG" --dry-run
